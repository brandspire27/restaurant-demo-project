      <stop offset="0.7" stop-color="#F8F3EA" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#F8F3EA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <!-- ornamental plate -->
  <circle cx="600" cy="450" r="346.15384615384613" fill="url(#plate)"/>
  <circle cx="600" cy="450" r="346.15384615384613" fill="none" stroke="#7C9070" stroke-width="1.5" opacity="0.25"/>
  <circle cx="600" cy="450" r="249.2307692307692" fill="none" stroke="#7C9070" stroke-width="1" opacity="0.18"/>
  <circle cx="600" cy="450" r="173.07692307692307" fill="none" stroke="#7C9070" stroke-width="1" opacity="0.12"/>
  <!-- steam wisps -->
