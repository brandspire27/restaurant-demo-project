<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7eede"/>
      <stop offset="1" stop-color="#c4d6b0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#7C9070" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#7C9070" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#7C9070" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="50%" r="50%">
