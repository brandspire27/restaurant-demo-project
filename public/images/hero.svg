      <stop offset="0" stop-color="#f3e2c0"/>
      <stop offset="1" stop-color="#e8c98f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#C9A227" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#C9A227" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F8F3EA" stop-opacity="0.10"/>
      <stop offset="0.7" stop-color="#F8F3EA" stop-opacity="0.04"/>
