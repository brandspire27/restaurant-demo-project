    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <!-- ornamental plate -->
  <circle cx="960" cy="540" r="415.38461538461536" fill="url(#plate)"/>
  <circle cx="960" cy="540" r="415.38461538461536" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.25"/>
