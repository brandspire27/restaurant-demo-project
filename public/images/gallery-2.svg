<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6dcc4"/>
      <stop offset="1" stop-color="#e9b896"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#C0392B" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#C0392B" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#C0392B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plate" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F8F3EA" stop-opacity="0.10"/>
      <stop offset="0.7" stop-color="#F8F3EA" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#F8F3EA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1000" height="1000" fill="url(#bg)"/>
  <rect width="1000" height="1000" fill="url(#glow)"/>
  <!-- ornamental plate -->
  <circle cx="500" cy="500" r="384.6153846153846" fill="url(#plate)"/>
  <circle cx="500" cy="500" r="384.6153846153846" fill="none" stroke="#C0392B" stroke-width="1.5" opacity="0.25"/>
  <circle cx="500" cy="500" r="276.9230769230769" fill="none" stroke="#C0392B" stroke-width="1" opacity="0.18"/>
  <circle cx="500" cy="500" r="192.3076923076923" fill="none" stroke="#C0392B" stroke-width="1" opacity="0.12"/>
  <!-- steam wisps -->
  <g opacity="0.18" stroke="#F8F3EA" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M470 346.1538461538462 q 10 -20 0 -40 t 0 -40"/>
    <path d="M530 346.1538461538462 q -10 -20 0 -40 t 0 -40"/>
  </g>
  <g transform="translate(500 500)">
    <text text-anchor="middle" y="-6" font-family="Playfair Display, Georgia, serif" font-size="63" font-weight="700" fill="#E0BE4A">The Ambience</text>
    <text text-anchor="middle" y="38" font-family="Poppins, sans-serif" font-size="24" fill="#F8F3EA" opacity="0.7" letter-spacing="2">INTERIOR</text>
  </g>
</svg>
